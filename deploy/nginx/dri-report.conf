# ── DRI Report Platform (cp.tech2.hybe.im/dri_report) ──
# 기존 server 블록(/etc/nginx/sites-enabled/community-pulse)에 include 한다.
# sudo nginx -t && sudo systemctl reload nginx
#
# 구성:
#   /dri_report/r/{slug}/...    → nginx alias 로 정적 파일 서빙 (auth_request 게이트)
#   /dri_report/auth/check      → uvicorn 직통 (인증 검증 엔드포인트, 외부에 노출)
#   /dri_report/...             → uvicorn (모든 web/API/MCP 라우트, auth_request 게이트)
#
# 인증 흐름:
#   1. 브라우저 요청 → nginx auth_request /dri_report_auth_check 호출 (서브요청)
#   2. /auth/check 가 200 + X-User-Email/X-User-Role 응답 → 통과 + 헤더 upstream
#   3. /auth/check 가 401 → @login_redirect 으로 302 → /dri_report/auth/login
#   4. API/MCP 경로(@api)는 401 그대로 반환 (Bearer 클라이언트가 처리)

# 트레일링슬래시 redirect
location = /dri_report { return 301 /dri_report/; }

# ── 인증 서브요청 (내부) ─────────────────────────────────
location = /dri_report_auth_check {
    internal;
    proxy_pass http://127.0.0.1:8092/auth/check;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Host $host;
    # 원본 Authorization 헤더 전달 (Bearer 검증용)
    proxy_set_header Authorization $http_authorization;
}

# 401 응답 → 로그인 페이지로 리다이렉트
location @dri_report_login {
    return 302 /dri_report/auth/login;
}

# ── /auth/check 직통 (uvicorn) — 외부 클라이언트가 직접 호출 가능 ──
location = /dri_report/auth/check {
    proxy_pass http://127.0.0.1:8092/auth/check;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
}

# ── 정적 리포트 파일 (auth_request 게이트) ────────────────
location ~ ^/dri_report/r/(.*)$ {
    auth_request /dri_report_auth_check;
    auth_request_set $auth_user_email $upstream_http_x_user_email;
    auth_request_set $auth_user_role  $upstream_http_x_user_role;
    error_page 401 = @dri_report_login;
    error_page 403 = @dri_report_login;

    alias /home/ubuntu/dri_report/server/var/reports/$1;
    try_files $uri $uri/ =404;
    # /r/{slug}/  →  index.html 자동 fallback
    if (-d $request_filename) {
        rewrite ^(.*[^/])$ $1/ break;
    }
}

# ── OIDC 콜백 + 로그인 페이지 (인증 게이트 X — 그것 자체가 로그인 흐름) ──
location ~ ^/dri_report/auth/(login|callback|logout|me)$ {
    rewrite ^/dri_report(.*)$ $1 break;
    proxy_pass http://127.0.0.1:8092;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /dri_report;
}

# ── API + MCP (Bearer 클라이언트 — 401 그대로) ────────────
location ~ ^/dri_report/(api|mcp)/ {
    auth_request /dri_report_auth_check;
    auth_request_set $auth_user_email $upstream_http_x_user_email;
    auth_request_set $auth_user_role  $upstream_http_x_user_role;
    # Bearer 클라이언트는 401 받으면 직접 처리 — redirect 안 함
    # (브라우저 fetch 도 마찬가지)

    rewrite ^/dri_report(.*)$ $1 break;
    proxy_pass http://127.0.0.1:8092;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /dri_report;
    # auth_request 결과를 upstream 에 전달
    proxy_set_header X-User-Email $auth_user_email;
    proxy_set_header X-User-Role $auth_user_role;

    # MCP streamable HTTP (SSE) 를 위해 버퍼링 끄기
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
    proxy_send_timeout 120s;
}

# ── 일반 web 라우트 (HTML 페이지, 폼 POST) ────────────────
location /dri_report/ {
    auth_request /dri_report_auth_check;
    auth_request_set $auth_user_email $upstream_http_x_user_email;
    auth_request_set $auth_user_role  $upstream_http_x_user_role;
    error_page 401 = @dri_report_login;

    rewrite ^/dri_report(.*)$ $1 break;
    proxy_pass http://127.0.0.1:8092;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /dri_report;
    proxy_set_header X-User-Email $auth_user_email;
    proxy_set_header X-User-Role $auth_user_role;

    # 업로드 100MB 까지
    client_max_body_size 110M;
    proxy_read_timeout 120s;
}
